name: Webcam Snapshot Vado Ligure

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ffmpeg and fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Extract frame from HLS stream with timestamp and arrow
        run: |
          mkdir -p docs
          NOW=$(TZ='Europe/Rome' date '+%d/%m/%Y %H\:%M\:%S')
          timeout 30 ffmpeg -y \
            -i "https://5e0add8153fcd.streamlock.net:1936/vedetta/vado-ligure.stream/playlist.m3u8" \
            -i assets/arrow.png \
            -filter_complex "[0:v]drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='${NOW}':fontcolor=white:fontsize=28:box=1:boxcolor=black@0.5:boxborderw=8:x=w-text_w-10:y=10[txt];[txt][1:v]overlay=(main_w-overlay_w)/2:10[outv]" \
            -map "[outv]" \
            -frames:v 1 -q:v 2 docs/latest.jpg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest.jpg
          git diff --staged --quiet || git commit -m "Aggiorna snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
