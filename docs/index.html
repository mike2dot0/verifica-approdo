<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webcam Vado Ligure - Ultimo Frame</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  img {
    max-width: 100%;
    max-height: 100vh;
    object-fit: contain;
  }
</style>
</head>
<body>

<img id="frame" src="latest.jpg" alt="Ultimo fotogramma webcam Vado Ligure">

<script>
  // Ogni 60 secondi ricarica l'immagine aggiungendo un parametro
  // variabile in fondo all'URL, cosi' il browser non usa la cache
  // e va a riprendere sempre l'ultima versione pubblicata.
  var REFRESH_SECONDS = 60;

  function refreshImage() {
    var img = document.getElementById('frame');
    img.src = 'latest.jpg?t=' + Date.now();
  }

  setInterval(refreshImage, REFRESH_SECONDS * 1000);
</script>

</body>
</html>
